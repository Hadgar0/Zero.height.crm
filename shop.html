<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Витрина</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,system-ui,sans-serif;background:#f2f2f2;color:#0f0f0f;min-height:100vh;-webkit-font-smoothing:antialiased}
/* HEADER */
.hdr{background:#111;padding:0 28px;position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.04)}
.hdr-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:16px}
.hdr-logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex:1;min-width:0}
.hdr-logo-icon{width:36px;height:36px;flex-shrink:0;background:#e11d48;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 14px rgba(225,29,72,.5)}
.hdr-logo h1{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-logo p{color:rgba(255,255,255,.3);font-size:11px;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-auth-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:8px 14px;cursor:pointer;color:rgba(255,255,255,.7);font-size:12.5px;font-weight:600;transition:all .15s;white-space:nowrap}
.hdr-auth-btn:hover{background:rgba(255,255,255,.13);color:#fff;border-color:rgba(255,255,255,.18)}
.hdr-cart{display:flex;align-items:center;gap:8px;background:#e11d48;border:none;border-radius:9px;padding:9px 18px;cursor:pointer;color:#fff;font-size:13px;font-weight:700;transition:all .15s;box-shadow:0 2px 12px rgba(225,29,72,.35)}
.hdr-cart:hover{background:#be123c;transform:translateY(-1px);box-shadow:0 4px 20px rgba(225,29,72,.45)}
.cart-count{background:rgba(0,0,0,.3);color:#fff;font-size:11px;font-weight:800;border-radius:99px;padding:1px 7px;min-width:20px;text-align:center;display:inline-block}
/* FLOATING CART */
.cart-fab{position:fixed;bottom:28px;right:28px;width:58px;height:58px;background:#e11d48;border-radius:18px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 6px 24px rgba(225,29,72,.5);z-index:150;transition:all .2s}
.cart-fab:hover{background:#be123c;transform:scale(1.07);box-shadow:0 8px 30px rgba(225,29,72,.6)}
.cart-fab-count{position:absolute;top:-7px;right:-7px;background:#0f0f0f;color:#fff;font-size:11px;font-weight:800;border-radius:99px;padding:2px 7px;min-width:21px;text-align:center;border:2.5px solid #fff}
/* STATUS BAR */
.status-bar{background:#fff;border-bottom:1px solid #e8e8e8;padding:9px 28px}
.status-inner{max-width:1320px;margin:0 auto;display:flex;align-items:center;gap:14px}
.status-badge{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:99px;font-size:12px;font-weight:700;border:1.5px solid}
.status-badge.retail{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.status-badge.opt{background:#f0fdf4;color:#065f46;border-color:#bbf7d0}
.status-badge.vip{background:#fffbeb;color:#92400e;border-color:#fde68a}
/* MAIN */
.main{max-width:1320px;margin:0 auto;padding:28px}
/* TOOLBAR — search + cats in one line */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
/* CATS */
.cats{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{padding:7px 16px;border-radius:99px;border:1.5px solid #e0e0e0;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#525252;transition:all .15s;line-height:1}
.cat-pill:hover{border-color:#0f0f0f;color:#0f0f0f;background:#fafafa}
.cat-pill.active{background:#0f0f0f;color:#fff;border-color:#0f0f0f;box-shadow:0 2px 8px rgba(0,0,0,.15)}
/* SEARCH */
.search-wrap{position:relative;min-width:260px;flex:1;max-width:400px}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#a3a3a3;width:15px;height:15px}
.search-wrap input{width:100%;padding:10px 13px 10px 37px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:13.5px;outline:none;background:#fff;font-family:inherit;transition:border-color .15s;color:#0f0f0f}
.search-wrap input:focus{border-color:#0f0f0f;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
/* CARD */
.card{background:#fff;border-radius:14px;border:1px solid #e8e8e8;overflow:hidden;transition:all .22s;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card:hover{box-shadow:0 10px 36px rgba(0,0,0,.09);transform:translateY(-4px);border-color:#d0d0d0}
.card-img{height:130px;background:linear-gradient(145deg,#f8f8f8,#efefef);display:flex;align-items:center;justify-content:center;font-size:52px;border-bottom:1px solid #f0f0f0}
.card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:3px}
.card-cat{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#b0b0b0}
.card-name{font-size:14px;font-weight:700;color:#0f0f0f;line-height:1.35;margin-top:1px}
.card-sku{font-size:11px;color:#b0b0b0}
.card-stock{font-size:11.5px;font-weight:600;margin-top:3px}
.card-stock.in{color:#059669}.card-stock.low{color:#d97706}.card-stock.out{color:#e11d48}
/* PRICES BLOCK */
.prices-block{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.price-tag{flex:1;min-width:0;border-radius:9px;padding:8px 6px;text-align:center;border:1.5px solid;transition:all .15s}
.price-tag.retail{background:#f0f9ff;border-color:#bae6fd}
.price-tag.opt{background:#f0fdf4;border-color:#bbf7d0}
.price-tag.vip{background:#fffbeb;border-color:#fde68a}
.price-tag.highlighted{box-shadow:0 3px 12px rgba(0,0,0,.1);transform:scale(1.05);z-index:1;position:relative}
.price-tag-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;opacity:.7}
.price-tag-val{font-size:13px;font-weight:800;margin-top:2px}
.price-tag.retail .price-tag-lbl,.price-tag.retail .price-tag-val{color:#0369a1}
.price-tag.opt .price-tag-lbl,.price-tag.opt .price-tag-val{color:#059669}
.price-tag.vip .price-tag-lbl,.price-tag.vip .price-tag-val{color:#92400e}
.card-btn{background:#0f0f0f;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;width:100%;margin-top:10px;letter-spacing:-.1px}
.card-btn:hover{background:#222;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.18)}
.card-btn:disabled{background:#e8e8e8;color:#b0b0b0;cursor:not-allowed;transform:none;box-shadow:none}
.card-btn-in{background:#059669!important;box-shadow:0 2px 10px rgba(5,150,105,.3)!important}
.card-btn-in:hover{background:#047857!important;box-shadow:0 4px 16px rgba(5,150,105,.4)!important}
/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:#b0b0b0;grid-column:1/-1}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty p{font-size:14px;font-weight:500}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px;width:100%;max-width:440px;box-shadow:0 28px 90px rgba(0,0,0,.2);overflow:hidden}
.modal-hdr{padding:24px 26px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-hdr h3{font-size:18px;font-weight:800;color:#0f0f0f;line-height:1.3;letter-spacing:-.3px}
.modal-hdr button{background:none;border:none;cursor:pointer;color:#b0b0b0;font-size:22px;line-height:1;padding:0;flex-shrink:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:.15s}
.modal-hdr button:hover{background:#f0f0f0;color:#0f0f0f}
.modal-body{padding:20px 26px}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;font-weight:700;color:#525252;text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px}
.fg input,.fg textarea,.fg select{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-family:inherit;outline:none;color:#0f0f0f;background:#fff;transition:all .15s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:#0f0f0f;box-shadow:0 0 0 3px rgba(0,0,0,.06)}
.fg textarea{resize:none;min-height:70px}
.modal-foot{padding:14px 26px 24px;display:flex;gap:10px}
.btn-cancel{flex:1;padding:12px;border:1.5px solid #e0e0e0;border-radius:10px;background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:#525252;transition:.15s}
.btn-cancel:hover{background:#f5f5f5;border-color:#ccc}
.btn-order{flex:2;padding:12px;border:none;border-radius:10px;background:#e11d48;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 10px rgba(225,29,72,.25)}
.btn-order:hover{background:#be123c;transform:translateY(-1px);box-shadow:0 4px 18px rgba(225,29,72,.4)}
.success-banner{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;font-size:14px;font-weight:600;color:#059669;margin:0 26px 20px}
/* CART PANEL */
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:390px;background:#fff;box-shadow:-6px 0 48px rgba(0,0,0,.12);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.cart-panel.open{transform:translateX(0)}
.cart-hdr{padding:22px 22px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ebebeb}
.cart-hdr h3{font-size:17px;font-weight:800;color:#0f0f0f;letter-spacing:-.2px}
.cart-hdr button{background:none;border:none;font-size:20px;cursor:pointer;color:#b0b0b0;transition:.15s;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.cart-hdr button:hover{background:#f0f0f0;color:#0f0f0f}
.cart-items{flex:1;overflow-y:auto;padding:12px 14px}
.cart-item{display:flex;align-items:flex-start;gap:10px;padding:13px 12px;border-radius:12px;margin-bottom:8px;background:#f8f8f8;border:1px solid #efefef;transition:.15s}
.cart-item:hover{background:#f4f4f4}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:600;color:#0f0f0f;line-height:1.3}
.cart-item-price{font-size:13.5px;color:#e11d48;font-weight:800;white-space:nowrap;margin-top:4px}
.qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:9px}
.qty-ctrl button{width:28px;height:28px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;font-size:15px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;font-weight:700;transition:.15s}
.qty-ctrl button:hover{border-color:#0f0f0f;background:#0f0f0f;color:#fff}
.qty-ctrl span{min-width:28px;text-align:center;font-size:14px;font-weight:700}
.cart-footer{padding:16px 20px;border-top:1px solid #ebebeb;background:#fafafa}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;font-weight:600;margin-bottom:13px;color:#525252}
.cart-total span:last-child{font-size:22px;font-weight:800;color:#0f0f0f}
.cart-checkout{width:100%;padding:14px;background:#e11d48;color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;box-shadow:0 2px 12px rgba(225,29,72,.3);letter-spacing:-.1px}
.cart-checkout:hover{background:#be123c;box-shadow:0 4px 20px rgba(225,29,72,.45)}
.cart-empty{text-align:center;padding:60px 20px;color:#b0b0b0;font-size:14px}
.cart-empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#bbb}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
  .cart-panel{width:100%}
  .hdr-inner{height:56px}
  .main{padding:16px}
  .prices-block{flex-direction:column}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{max-width:100%}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <a class="hdr-logo" href="#">
      <div class="hdr-logo-icon">⚡</div>
      <div>
        <h1 id="shop-name">Zero.height</h1>
        <p id="shop-subtitle">Интернет-магазин</p>
      </div>
    </a>
    <div class="hdr-right">
      <button class="hdr-auth-btn" onclick="openAuthModal()" id="auth-btn">
        👤 <span id="auth-btn-label">Войти</span>
      </button>
      <button class="hdr-cart" onclick="toggleCart()">
        🛒&nbsp;<span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
</header>

<!-- STATUS BAR (shown when logged in) -->
<div class="status-bar" id="status-bar" style="display:none">
  <div class="status-inner">
    <span style="font-size:12px;color:#64748b;font-weight:500">Ваши цены:</span>
    <span class="status-badge retail" id="user-status-badge">💳 Розница</span>
    <span style="font-size:12px;color:#94a3b8" id="user-welcome"></span>
    <button onclick="logoutUser()" style="margin-left:auto;background:none;border:none;font-size:12px;color:#94a3b8;cursor:pointer;text-decoration:underline">Выйти</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="shop-search" placeholder="Поиск товара..." oninput="renderShop()">
    </div>
    <div class="cats" id="cats-bar">
      <button class="cat-pill active" data-cat="" onclick="setCat('',this)">Все товары</button>
    </div>
  </div>
  <div class="grid" id="shop-grid"></div>
</div>

<!-- CHECKOUT MODAL -->
<div class="overlay hidden" id="m-checkout">
  <div class="modal" style="max-width:400px">
    <div class="modal-hdr">
      <h3>🛒 Оформление заказа</h3>
      <button onclick="closeCheckout()">×</button>
    </div>
    <div id="checkout-success" class="success-banner" style="display:none;margin:16px 24px 0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;height:20px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>
      Заказ принят! Менеджер свяжется с вами.
    </div>
    <div class="modal-body" id="checkout-form-wrap">
      <div id="co-client-found" style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;padding:12px 16px;font-size:13px;color:#15803d;font-weight:600;margin-bottom:16px;line-height:1.6"></div>
      <div id="co-cart-summary" style="background:#fafafa;border:1px solid #e8e8e8;border-radius:10px;padding:12px 14px;margin-bottom:16px;max-height:140px;overflow-y:auto"></div>
      <div class="fg" style="margin-bottom:0">
        <label>Комментарий к заказу</label>
        <textarea id="co-comment" placeholder="Пожелания, уточнения..." style="min-height:60px;resize:none;width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;transition:all .15s"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeCheckout()">Отмена</button>
      <button class="btn-order" id="checkout-submit-btn" onclick="submitCheckout()">✓ Оформить</button>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="overlay hidden" id="m-auth">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr" style="padding-bottom:0">
      <h3 id="auth-modal-title">Вход в аккаунт</h3>
      <button onclick="closeAuthModal()">×</button>
    </div>
    <!-- Tabs -->
    <div style="display:flex;gap:0;padding:16px 26px 0;border-bottom:1px solid #ebebeb;margin-top:14px">
      <button id="tab-login" onclick="switchAuthTab('login')" style="flex:1;padding:9px 0;background:none;border:none;border-bottom:2.5px solid #0f0f0f;font-size:13.5px;font-weight:700;cursor:pointer;color:#0f0f0f;transition:.15s">Войти</button>
      <button id="tab-reg" onclick="switchAuthTab('reg')" style="flex:1;padding:9px 0;background:none;border:none;border-bottom:2.5px solid transparent;font-size:13.5px;font-weight:600;cursor:pointer;color:#a3a3a3;transition:.15s">Регистрация</button>
    </div>
    <!-- Login form -->
    <div id="auth-login-form" class="modal-body">
      <div id="auth-error" style="display:none;background:#fff1f2;border:1.5px solid #fda4af;border-radius:10px;padding:10px 14px;font-size:13px;color:#be123c;font-weight:600;margin-bottom:14px"></div>
      <div class="fg">
        <label>Телефон</label>
        <input id="login-phone" type="tel" placeholder="+7 900 000-00-00" autocomplete="tel">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Пароль</label>
        <div style="position:relative">
          <input id="login-pass" type="password" placeholder="Введите пароль" autocomplete="current-password" style="width:100%;padding:12px 44px 12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;transition:all .15s">
          <button onclick="togglePassVis('login-pass',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a3a3a3;font-size:16px;padding:0;line-height:1">👁</button>
        </div>
      </div>
    </div>
    <div class="modal-foot" id="auth-login-foot">
      <button class="btn-cancel" onclick="closeAuthModal()">Отмена</button>
      <button class="btn-order" onclick="submitLogin()">→ Войти</button>
    </div>
    <!-- Register form -->
    <div id="auth-reg-form" class="modal-body" style="display:none">
      <div id="reg-error" style="display:none;background:#fff1f2;border:1.5px solid #fda4af;border-radius:10px;padding:10px 14px;font-size:13px;color:#be123c;font-weight:600;margin-bottom:14px"></div>
      <div class="fg">
        <label>ФИО <span style="color:#ef4444">*</span></label>
        <input id="reg-name" type="text" placeholder="Иванов Иван Иванович" autocomplete="name">
      </div>
      <div class="fg">
        <label>Название сервисного центра <span style="color:#ef4444">*</span></label>
        <input id="reg-company" type="text" placeholder="ООО «Мастер»" autocomplete="organization">
      </div>
      <div class="fg">
        <label>Телефон <span style="color:#ef4444">*</span></label>
        <input id="reg-phone" type="tel" placeholder="+7 900 000-00-00" autocomplete="tel">
      </div>
      <div class="fg">
        <label>Пароль <span style="color:#ef4444">*</span></label>
        <div style="position:relative">
          <input id="reg-pass" type="password" placeholder="Минимум 4 символа" autocomplete="new-password" style="width:100%;padding:12px 44px 12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;font-family:inherit;transition:all .15s">
          <button onclick="togglePassVis('reg-pass',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a3a3a3;font-size:16px;padding:0;line-height:1">👁</button>
        </div>
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Повторите пароль <span style="color:#ef4444">*</span></label>
        <input id="reg-pass2" type="password" placeholder="Повторите пароль" autocomplete="new-password">
      </div>
    </div>
    <div class="modal-foot" id="auth-reg-foot" style="display:none">
      <button class="btn-cancel" onclick="closeAuthModal()">Отмена</button>
      <button class="btn-order" onclick="submitRegister()">✓ Зарегистрироваться</button>
    </div>
  </div>
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-hdr">
    <h3>🛒 Корзина</h3>
    <button onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Итого:</span>
      <span id="cart-total-val">0 ₽</span>
    </div>
    <button class="cart-checkout" onclick="checkoutCart()">Оформить заказ</button>
  </div>
</div>

<!-- FAB -->
<button class="cart-fab" onclick="toggleCart()" title="Корзина">
  🛒
  <span class="cart-fab-count" id="cart-fab-count" style="display:none">0</span>
</button>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let _cat  = ''
let _cart = JSON.parse(localStorage.getItem('shop_cart')||'[]')
let _user = JSON.parse(localStorage.getItem('shop_user')||'null')
// _user: {name, phone, company, status: 'retail'|'opt'|'vip'}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const TIERS = {
  retail: {field:'price_retail', label:'Розница', cls:'retail', icon:'💳'},
  opt:    {field:'price_opt',    label:'Опт',     cls:'opt',    icon:'📦'},
  vip:    {field:'price_vip',    label:'VIP',     cls:'vip',    icon:'⭐'},
}
function catEmoji(cat){
  if(!cat) return '📦'
  const c=cat.toLowerCase()
  if(c.includes('запч')) return '🔩'
  if(c.includes('акс')) return '🎧'
  if(c.includes('расх')) return '🧴'
  if(c.includes('стекл')) return '📱'
  if(c.includes('гидр')) return '🛡️'
  return '📦'
}
function getItems(){
  return (JSON.parse(localStorage.getItem('wh_items')||'[]')).filter(it=>it.qty>0)
}
function userStatus(){ return _user?(_user.status||'retail'):'retail' }

// ── AUTH ──────────────────────────────────────────────────────────────────────
// shop_accounts: [{phone, passHash, name, company, status, created_at}]
function getAccounts(){ return JSON.parse(localStorage.getItem('shop_accounts')||'[]') }
function saveAccounts(a){ localStorage.setItem('shop_accounts',JSON.stringify(a)) }

// простой хэш — не криптографический, для localStorage достаточно
function simpleHash(s){
  let h=0
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}
  return h.toString(36)
}
function normPhone(p){ return p.replace(/\D/g,'') }

function openAuthModal(tab){
  switchAuthTab(tab||'login')
  document.getElementById('login-phone').value=''
  document.getElementById('login-pass').value=''
  document.getElementById('auth-error').style.display='none'
  document.getElementById('reg-error').style.display='none'
  document.getElementById('m-auth').classList.remove('hidden')
}
function closeAuthModal(){
  document.getElementById('m-auth').classList.add('hidden')
}
function switchAuthTab(t){
  const isLogin=t==='login'
  document.getElementById('auth-login-form').style.display=isLogin?'':'none'
  document.getElementById('auth-login-foot').style.display=isLogin?'':'none'
  document.getElementById('auth-reg-form').style.display=isLogin?'none':''
  document.getElementById('auth-reg-foot').style.display=isLogin?'none':''
  document.getElementById('tab-login').style.borderBottomColor=isLogin?'#0f0f0f':'transparent'
  document.getElementById('tab-login').style.color=isLogin?'#0f0f0f':'#a3a3a3'
  document.getElementById('tab-login').style.fontWeight=isLogin?'700':'600'
  document.getElementById('tab-reg').style.borderBottomColor=isLogin?'transparent':'#0f0f0f'
  document.getElementById('tab-reg').style.color=isLogin?'#a3a3a3':'#0f0f0f'
  document.getElementById('tab-reg').style.fontWeight=isLogin?'600':'700'
  document.getElementById('auth-modal-title').textContent=isLogin?'Вход в аккаунт':'Регистрация'
}
function togglePassVis(id,btn){
  const inp=document.getElementById(id)
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈'}
  else{inp.type='password';btn.textContent='👁'}
}
function showAuthError(msg){ const e=document.getElementById('auth-error');e.textContent=msg;e.style.display='block' }
function showRegError(msg){ const e=document.getElementById('reg-error');e.textContent=msg;e.style.display='block' }

function submitLogin(){
  document.getElementById('auth-error').style.display='none'
  const phone=normPhone(document.getElementById('login-phone').value.trim())
  const pass=document.getElementById('login-pass').value
  if(!phone||phone.length<7){ showAuthError('Введите номер телефона'); return }
  if(!pass){ showAuthError('Введите пароль'); return }
  const accounts=getAccounts()
  const acc=accounts.find(a=>normPhone(a.phone)===phone)
  if(!acc){ showAuthError('Аккаунт с таким номером не найден. Зарегистрируйтесь.'); return }
  if(acc.passHash!==simpleHash(pass)){ showAuthError('Неверный пароль'); return }
  // Подтягиваем shop_status из CRM если есть
  const clients=JSON.parse(localStorage.getItem('clients')||'[]')
  const crmClient=clients.find(c=>normPhone(c.phone||'')===phone)
  const status=crmClient&&crmClient.shop_status?crmClient.shop_status:(acc.status||'retail')
  _user={name:acc.name,phone:acc.phone,company:acc.company||'',status}
  localStorage.setItem('shop_user',JSON.stringify(_user))
  closeAuthModal()
  updateAuthUI();renderShop()
}

function submitRegister(){
  document.getElementById('reg-error').style.display='none'
  const name=document.getElementById('reg-name').value.trim()
  const company=document.getElementById('reg-company').value.trim()
  const phone=document.getElementById('reg-phone').value.trim()
  const pass=document.getElementById('reg-pass').value
  const pass2=document.getElementById('reg-pass2').value
  if(!name){ showRegError('Укажите ФИО'); return }
  if(!company){ showRegError('Укажите название сервисного центра'); return }
  if(!phone||normPhone(phone).length<7){ showRegError('Укажите корректный номер телефона'); return }
  if(!pass||pass.length<4){ showRegError('Пароль должен содержать минимум 4 символа'); return }
  if(pass!==pass2){ showRegError('Пароли не совпадают'); return }
  const accounts=getAccounts()
  if(accounts.find(a=>normPhone(a.phone)===normPhone(phone))){
    showRegError('Аккаунт с этим номером уже существует. Войдите.')
    return
  }
  // Подтягиваем shop_status из CRM если уже есть такой клиент
  const clients=JSON.parse(localStorage.getItem('clients')||'[]')
  const crmClient=clients.find(c=>normPhone(c.phone||'')===normPhone(phone))
  const status=crmClient&&crmClient.shop_status?crmClient.shop_status:'retail'
  const newAcc={phone:normPhone(phone),passHash:simpleHash(pass),name,company,status,created_at:new Date().toISOString()}
  accounts.push(newAcc)
  saveAccounts(accounts)
  _user={name,phone:normPhone(phone),company,status}
  localStorage.setItem('shop_user',JSON.stringify(_user))
  closeAuthModal()
  updateAuthUI();renderShop()
}

function logoutUser(){
  _user=null
  localStorage.removeItem('shop_user')
  updateAuthUI()
  renderShop()
}
function updateAuthUI(){
  const lbl=document.getElementById('auth-btn-label')
  const bar=document.getElementById('status-bar')
  const badge=document.getElementById('user-status-badge')
  const welcome=document.getElementById('user-welcome')
  if(_user){
    lbl.textContent=_user.name.split(' ')[0]
    bar.style.display='block'
    const t=TIERS[_user.status||'retail']||TIERS.retail
    badge.textContent=t.icon+' '+t.label
    badge.className='status-badge '+t.cls
    welcome.textContent=_user.company?_user.company+' · '+_user.name:_user.name
  } else {
    lbl.textContent='Войти'
    bar.style.display='none'
  }
}

// ── CATEGORIES ────────────────────────────────────────────────────────────────
function setCat(c,el){
  _cat=c
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'))
  if(el) el.classList.add('active')
  renderShop()
}
function buildCats(){
  const items=getItems()
  const cats=[...new Set(items.map(it=>it.cat||'').filter(Boolean))].sort()
  const bar=document.getElementById('cats-bar')
  bar.innerHTML=`<button class="cat-pill active" onclick="setCat('',this)">Все товары</button>`
    +cats.map(c=>`<button class="cat-pill" onclick="setCat('${c}',this)">${catEmoji(c)} ${c}</button>`).join('')
}

// ── RENDER SHOP ───────────────────────────────────────────────────────────────
function renderShop(){
  const q=document.getElementById('shop-search').value.toLowerCase()
  let items=getItems()
  if(_cat) items=items.filter(it=>(it.cat||'')==_cat)
  if(q)    items=items.filter(it=>it.name.toLowerCase().includes(q)||(it.sku||'').toLowerCase().includes(q))
  const grid=document.getElementById('shop-grid')
  if(!items.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Ничего не найдено — попробуйте другой запрос</p></div>'
    return
  }
  const uStatus=userStatus()
  grid.innerHTML=items.map(it=>{
    const prices=Object.entries(TIERS).map(([k,t])=>{
      const p=it[t.field]
      if(!p) return ''
      const isUser=(k===uStatus)
      return `<div class="price-tag ${t.cls}${isUser&&_user?' highlighted':''}">
        <div class="price-tag-lbl">${t.icon} ${t.label}</div>
        <div class="price-tag-val">${Number(p).toLocaleString('ru')} ₽</div>
      </div>`
    }).join('')
    const hasPrices=it.price_retail||it.price_opt||it.price_vip
    const stock=it.qty<=0?'out':it.qty<=3?'low':'in'
    const stockText=it.qty<=0?'Нет в наличии':it.qty<=3?`Осталось ${it.qty} шт.`:'В наличии'
    // Price for cart = user's tier price or first available
    const cartPrice=it[TIERS[uStatus].field]||it.price_retail||it.price_opt||it.price_vip||0
    return `<div class="card">
      <div class="card-img">${catEmoji(it.cat)}</div>
      <div class="card-body">
        <div class="card-cat">${it.cat||'Товар'}</div>
        <div class="card-name">${it.name}</div>
        ${it.sku?`<div class="card-sku">Арт: ${it.sku}</div>`:''}
        <div class="card-stock ${stock}">${stock==='in'?'✓ ':stock==='low'?'⚠ ':'✕ '}${stockText}</div>
        ${hasPrices?`<div class="prices-block">${prices}</div>`:'<div style="font-size:12px;color:#94a3b8;margin-top:6px">Цена по запросу</div>'}
        <button class="card-btn${_cart.find(c=>c.id===it.id)?' card-btn-in':''}" id="cb-${it.id}" onclick="cartAdd(${it.id},this)" ${it.qty<=0?'disabled':''}>
          ${_cart.find(c=>c.id===it.id)?'✓ В корзине':'+ В корзину'}
        </button>
      </div>
    </div>`
  }).join('')
}

// ── CART ADD (прямо с карточки, без модалки) ─────────────────────────────────
function cartAdd(id, btn){
  addToCart(id, 1)
  if(btn){ btn.textContent='✓ В корзине'; btn.classList.add('card-btn-in'); btn.style.background='' }
}

// ── CHECKOUT ──────────────────────────────────────────────────────────────────
function openCheckout(){
  if(!_cart.length){ alert('Корзина пуста'); return }
  if(!_user){ openAuthModal('login'); return }
  const t=TIERS[_user.status||'retail']||TIERS.retail
  // Клиент
  document.getElementById('co-client-found').innerHTML=
    '👤 <b>'+_user.name+'</b>'
    +(_user.company?' &nbsp;·&nbsp; '+_user.company:'')
    +'<br>'+t.icon+' '+t.label+' &nbsp;·&nbsp; 📞 '+_user.phone
  // Состав корзины
  const allItems=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const status=_user.status||'retail'
  let cartTotal=0
  const rows=_cart.map(c=>{
    const it=allItems.find(i=>i.id===c.id)
    const price=it?(it[TIERS[status].field]||it.price_retail||it.price_opt||it.price_vip||c.price):c.price
    cartTotal+=price*c.qty
    return `<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px solid #f0f0f0">
      <span style="color:#525252">${c.name} <span style="color:#a3a3a3">× ${c.qty}</span></span>
      <span style="font-weight:700">${(price*c.qty).toLocaleString('ru')} ₽</span>
    </div>`
  }).join('')
  document.getElementById('co-cart-summary').innerHTML=rows
    +`<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:800;padding-top:8px;margin-top:2px">
      <span>Итого</span><span style="color:#e11d48">${cartTotal.toLocaleString('ru')} ₽</span>
    </div>`
  document.getElementById('co-comment').value=''
  document.getElementById('checkout-success').style.display='none'
  document.getElementById('checkout-form-wrap').style.display=''
  document.getElementById('checkout-submit-btn').style.display=''
  document.getElementById('m-checkout').classList.remove('hidden')
}
function closeCheckout(){ document.getElementById('m-checkout').classList.add('hidden') }

function submitCheckout(){
  if(!_user){ closeCheckout(); openAuthModal('login'); return }
  const status=_user.status||'retail'
  const allItems=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const cartFinal=_cart.map(c=>{
    const it=allItems.find(i=>i.id===c.id)
    const price=it?(it[TIERS[status].field]||it.price_retail||it.price_opt||it.price_vip||c.price):c.price
    return{...c,price}
  })
  const total=cartFinal.reduce((s,c)=>s+(c.price*c.qty),0)
  const orders=JSON.parse(localStorage.getItem('shop_orders')||'[]')
  orders.push({
    id:Date.now(),
    item_id:'cart',
    item_name:'Заказ из корзины ('+_cart.length+' поз.)',
    items:cartFinal,
    qty:_cart.reduce((s,c)=>s+c.qty,0),
    price:total, total,
    tier:status,
    client:_user.name,
    phone:_user.phone,
    company:_user.company||'',
    comment:document.getElementById('co-comment').value.trim(),
    status:'new',
    created_at:new Date().toISOString()
  })
  localStorage.setItem('shop_orders',JSON.stringify(orders))
  _cart=[];saveCart();renderCart();updateCartCount();renderShop()
  document.getElementById('checkout-success').style.display='flex'
  document.getElementById('checkout-form-wrap').style.display='none'
  document.getElementById('checkout-submit-btn').style.display='none'
  setTimeout(closeCheckout,2800)
}

// ── CART ──────────────────────────────────────────────────────────────────────
function addToCart(id,qty){
  const items=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const it=items.find(i=>i.id===id)
  if(!it) return
  // Цена пересчитывается при оформлении по статусу клиента
  const price=it.price_retail||it.price_opt||it.price_vip||0
  const ex=_cart.find(c=>c.id===id)
  if(ex){ ex.qty+=qty } else { _cart.push({id,name:it.name,price,qty,cat:it.cat}) }
  saveCart(); renderCart(); updateCartCount()
}
function removeFromCart(id){
  _cart=_cart.filter(c=>c.id!==id)
  saveCart(); renderCart(); updateCartCount(); renderShop()
}
function changeQty(id,delta){
  const item=_cart.find(c=>c.id===id)
  if(!item) return
  item.qty=Math.max(1,item.qty+delta)
  saveCart(); renderCart(); updateCartCount()
}
function saveCart(){ localStorage.setItem('shop_cart',JSON.stringify(_cart)) }
function updateCartCount(){
  const total=_cart.reduce((s,c)=>s+c.qty,0)
  const cc=document.getElementById('cart-count')
  const fc=document.getElementById('cart-fab-count')
  if(cc){ cc.textContent=total; cc.style.background=total>0?'#ef4444':'rgba(255,255,255,.3)' }
  if(fc){ fc.textContent=total; fc.style.display=total>0?'inline-block':'none' }
  const fab=document.querySelector('.cart-fab')
  if(fab&&total>0){ fab.style.transform='scale(1.18)'; setTimeout(()=>fab.style.transform='',200) }
}
function renderCart(){
  const list=document.getElementById('cart-items-list')
  if(!_cart.length){
    list.innerHTML='<div class="cart-empty"><div class="cart-empty-icon">🛒</div>Корзина пуста</div>'
    document.getElementById('cart-total-val').textContent='0 ₽'
    return
  }
  list.innerHTML=_cart.map(c=>`<div class="cart-item">
    <div class="cart-item-info">
      <div class="cart-item-name">${c.name}</div>
      <div class="cart-item-price">${(c.price*c.qty).toLocaleString('ru')} ₽</div>
      <div class="qty-ctrl">
        <button onclick="changeQty(${c.id},-1)">−</button>
        <span>${c.qty}</span>
        <button onclick="changeQty(${c.id},+1)">+</button>
        <button onclick="removeFromCart(${c.id})" style="color:#dc2626;border-color:#fecaca">✕</button>
      </div>
    </div>
  </div>`).join('')
  const total=_cart.reduce((s,c)=>s+(c.price*c.qty),0)
  document.getElementById('cart-total-val').textContent=total.toLocaleString('ru')+' ₽'
}
function toggleCart(){ document.getElementById('cart-panel').classList.toggle('open') }
function checkoutCart(){
  toggleCart()
  openCheckout()
}

// ── INIT ──────────────────────────────────────────────────────────────────────
;(function init(){
  const shopName=localStorage.getItem('shop_name')||localStorage.getItem('org_code')||'Zero.height'
  document.getElementById('shop-name').textContent=shopName
  document.title=shopName+' — Витрина'
  buildCats()
  renderShop()
  renderCart()
  updateCartCount()
  updateAuthUI()
})()
</script>
</body>
</html>
