<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Витрина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --white:#ffffff;
  --off:#f7f6f4;
  --black:#111010;
  --ink:#1a1a1a;
  --red:#d42b2b;
  --red2:#b01e1e;
  --muted:#888888;
  --line:#e4e4e4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--off);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}
/* ── HEADER ── */
.hdr{background:var(--black);border-bottom:2px solid var(--red);position:sticky;top:0;z-index:100;height:60px}
.hdr-inner{max-width:1400px;margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:100%;gap:16px}
.hdr-logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex:1;min-width:0}
.hdr-logo-icon{width:32px;height:32px;flex-shrink:0;background:var(--red);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:15px}
.hdr-logo h1{font-family:'Bebas Neue',sans-serif;color:#fff;font-size:22px;letter-spacing:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1}
.hdr-logo p{color:rgba(255,255,255,.3);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-auth-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,.18);border-radius:3px;padding:7px 14px;cursor:pointer;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif}
.hdr-auth-btn:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.35)}
.hdr-cart{display:flex;align-items:center;gap:8px;background:var(--red);border:none;border-radius:3px;padding:8px 18px;cursor:pointer;color:#fff;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:background .2s;font-family:'DM Sans',sans-serif}
.hdr-cart:hover{background:var(--red2)}
.cart-count{background:rgba(0,0,0,.3);color:#fff;font-size:11px;font-weight:700;border-radius:2px;padding:1px 6px;min-width:18px;text-align:center;display:inline-block}
/* ── FAB ── */
.cart-fab{position:fixed;bottom:32px;right:32px;width:54px;height:54px;background:var(--red);border-radius:3px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;z-index:150;transition:background .2s}
.cart-fab:hover{background:var(--red2)}
.cart-fab-count{position:absolute;top:-8px;right:-8px;background:var(--black);color:#fff;font-size:10px;font-weight:700;border-radius:2px;padding:2px 5px;min-width:18px;text-align:center;border:2px solid var(--off)}
/* ── STATUS BAR ── */
.status-bar{background:var(--white);border-bottom:1px solid var(--line);padding:0 40px;height:40px;display:flex;align-items:center}
.status-inner{max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center;gap:16px}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid}
.status-badge.retail{background:#e8f0fe;color:#1a56c4;border-color:#c5d8fc}
.status-badge.opt{background:#e6f4ea;color:#1a6e34;border-color:#b6dfc4}
.status-badge.vip{background:#fef9e7;color:#7a5a00;border-color:#f0d97a}
/* ── LAYOUT ── */
.main{max-width:1400px;margin:0 auto;padding:32px 40px}
/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--line)}
/* ── SEARCH ── */
.search-wrap{position:relative;min-width:240px;flex:1;max-width:360px}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:3px;font-size:13px;outline:none;background:var(--white);font-family:'DM Sans',sans-serif;color:var(--ink);transition:border-color .2s}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--ink)}
/* ── CATS ── */
.cats{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{padding:6px 14px;border-radius:3px;border:1px solid var(--line);background:var(--white);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif;line-height:1}
.cat-pill:hover{border-color:var(--ink);color:var(--ink)}
.cat-pill.active{background:var(--black);color:#fff;border-color:var(--black)}
/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
/* ── CARD (сохраняем стиль с фото) ── */
.card{background:var(--white);border-radius:12px;border:1px solid var(--line);overflow:hidden;transition:border-color .2s;display:flex;flex-direction:column}
.card:hover{border-color:#c8c8c8}
.card-img{height:130px;background:var(--off);display:flex;align-items:center;justify-content:center;font-size:52px;border-bottom:1px solid var(--line)}
.card-body{padding:14px 16px;flex:1;display:flex;flex-direction:column;gap:3px}
.card-cat{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.card-name{font-size:14px;font-weight:600;color:var(--ink);line-height:1.35;margin-top:2px}
.card-sku{font-size:11px;color:var(--muted)}
.card-stock{font-size:11.5px;font-weight:600;margin-top:3px}
.card-stock.in{color:#1a6e34}.card-stock.low{color:#b45309}.card-stock.out{color:var(--red)}
/* PRICES */
.prices-block{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.price-tag{flex:1;min-width:0;border-radius:8px;padding:8px 6px;text-align:center;border:1.5px solid;transition:all .15s}
.price-tag.retail{background:#f0f9ff;border-color:#bae6fd}
.price-tag.opt{background:#f0fdf4;border-color:#bbf7d0}
.price-tag.vip{background:#fffbeb;border-color:#fde68a}
.price-tag.highlighted{outline:2px solid var(--ink);outline-offset:-1px}
.price-tag-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;opacity:.7}
.price-tag-val{font-size:13px;font-weight:800;margin-top:2px}
.price-tag.retail .price-tag-lbl,.price-tag.retail .price-tag-val{color:#0369a1}
.price-tag.opt .price-tag-lbl,.price-tag.opt .price-tag-val{color:#1a6e34}
.price-tag.vip .price-tag-lbl,.price-tag.vip .price-tag-val{color:#7a5a00}
.card-btn{background:var(--black);color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;width:100%;margin-top:10px;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.card-btn:hover{background:#2a2a2a}
.card-btn:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}
.card-btn-in{background:#1a6e34!important}
.card-btn-in:hover{background:#155c2b!important}
/* ── EMPTY ── */
.empty{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:40px;margin-bottom:16px;opacity:.4;display:block}
.empty p{font-size:13px;font-weight:500;letter-spacing:.5px}
/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--white);border-radius:4px;border:1px solid var(--line);width:100%;max-width:440px;overflow:hidden}
.modal-hdr{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);padding-bottom:16px}
.modal-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--ink);line-height:1;text-transform:uppercase}
.modal-hdr button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:2px;transition:.15s}
.modal-hdr button:hover{background:var(--off);color:var(--ink)}
.modal-body{padding:20px 24px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:3px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:var(--ink);background:var(--white);transition:border-color .2s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--ink)}
.fg textarea{resize:none;min-height:70px}
.modal-foot{padding:12px 24px 20px;display:flex;gap:8px;border-top:1px solid var(--line)}
.btn-cancel{flex:1;padding:10px;border:1px solid var(--line);border-radius:3px;background:var(--white);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-cancel:hover{background:var(--off);color:var(--ink)}
.btn-order{flex:2;padding:10px;border:none;border-radius:3px;background:var(--red);color:#fff;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background .2s;font-family:'DM Sans',sans-serif}
.btn-order:hover{background:var(--red2)}
.success-banner{background:#e6f4ea;border:1px solid #b6dfc4;border-radius:3px;padding:14px 18px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#1a6e34;margin:0 24px 16px}
/* ── CART PANEL ── */
.cart-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--white);border-left:1px solid var(--line);z-index:200;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.cart-panel.open{transform:translateX(0)}
.cart-hdr{padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--red)}
.cart-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--ink);text-transform:uppercase}
.cart-hdr button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);transition:.15s;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:2px}
.cart-hdr button:hover{background:var(--off);color:var(--ink)}
.cart-items{flex:1;overflow-y:auto;padding:12px}
.cart-item{display:flex;align-items:flex-start;gap:10px;padding:12px;margin-bottom:1px;background:var(--white);border:1px solid var(--line);border-radius:3px;margin-bottom:6px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.3}
.cart-item-price{font-size:13px;color:var(--red);font-weight:700;white-space:nowrap;margin-top:4px;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px;font-size:15px}
.qty-ctrl{display:flex;align-items:center;gap:6px;margin-top:8px}
.qty-ctrl button{width:26px;height:26px;border-radius:2px;border:1px solid var(--line);background:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;transition:.15s;color:var(--ink)}
.qty-ctrl button:hover{border-color:var(--ink);background:var(--ink);color:#fff}
.qty-ctrl span{min-width:28px;text-align:center;font-size:13px;font-weight:700}
.cart-footer{padding:16px;border-top:1px solid var(--line);background:var(--off)}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.cart-total span:last-child{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--ink)}
.cart-checkout{width:100%;padding:13px;background:var(--red);color:#fff;border:none;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;font-family:'DM Sans',sans-serif}
.cart-checkout:hover{background:var(--red2)}
.cart-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.cart-empty-icon{font-size:36px;margin-bottom:12px;opacity:.3;display:block}
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:0}
::-webkit-scrollbar-thumb:hover{background:#ccc}
/* ── AUTH TABS ── */
#tab-login,#tab-reg{font-family:'DM Sans',sans-serif!important;font-size:11px!important;font-weight:700!important;letter-spacing:1.5px!important;text-transform:uppercase!important}
@media(max-width:640px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .cart-panel{width:100%}
  .hdr-inner{padding:0 16px}
  .main{padding:20px 16px}
  .status-bar{padding:0 16px}
  .prices-block{flex-direction:column}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{max-width:100%}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <a class="hdr-logo" href="#">
      <div class="hdr-logo-icon">⚡</div>
      <div>
        <h1 id="shop-name">ZERO.HEIGHT</h1>
        <p id="shop-subtitle">КАТАЛОГ ЗАПЧАСТЕЙ</p>
      </div>
    </a>
    <div class="hdr-right">
      <button class="hdr-auth-btn" onclick="openAuthModal()" id="auth-btn">
        👤 <span id="auth-btn-label">ВОЙТИ</span>
      </button>
      <button class="hdr-cart" onclick="toggleCart()">
        КОРЗИНА &nbsp;<span class="cart-count" id="cart-count">0</span>
      </button>
    </div>
  </div>
</header>

<!-- STATUS BAR (shown when logged in) -->
<div class="status-bar" id="status-bar" style="display:none">
  <div class="status-inner">
    <span style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Ваш тариф:</span>
    <span class="status-badge retail" id="user-status-badge">РОЗНИЦА</span>
    <span style="font-size:12px;color:var(--muted);font-weight:500" id="user-welcome"></span>
    <button onclick="logoutUser()" style="margin-left:auto;background:none;border:none;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:.2s" onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--muted)'">ВЫЙТИ →</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="toolbar">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="shop-search" placeholder="Поиск товара..." oninput="renderShop()">
    </div>
    <div class="cats" id="cats-bar">
      <button class="cat-pill active" data-cat="" onclick="setCat('',this)">Все товары</button>
    </div>
  </div>
  <div class="grid" id="shop-grid"></div>
</div>

<!-- CHECKOUT MODAL -->
<div class="overlay hidden" id="m-checkout">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr">
      <h3>ОФОРМЛЕНИЕ ЗАКАЗА</h3>
      <button onclick="closeCheckout()">×</button>
    </div>
    <div id="checkout-success" class="success-banner" style="display:none;margin:16px 24px 0">
      ✓ ЗАКАЗ ПРИНЯТ — МЕНЕДЖЕР СВЯЖЕТСЯ С ВАМИ
    </div>
    <div class="modal-body" id="checkout-form-wrap">
      <div id="co-client-found" style="background:#e6f4ea;border:1px solid #b6dfc4;border-radius:3px;padding:10px 14px;font-size:12px;color:#1a6e34;font-weight:700;letter-spacing:.3px;margin-bottom:14px;line-height:1.6"></div>
      <div id="co-cart-summary" style="background:var(--off);border:1px solid var(--line);border-radius:3px;padding:12px 14px;margin-bottom:14px;max-height:140px;overflow-y:auto"></div>
      <div class="fg" style="margin-bottom:0">
        <label>Комментарий к заказу</label>
        <textarea id="co-comment" placeholder="Пожелания, уточнения..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeCheckout()">Отмена</button>
      <button class="btn-order" id="checkout-submit-btn" onclick="submitCheckout()">ОФОРМИТЬ</button>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="overlay hidden" id="m-auth">
  <div class="modal" style="max-width:420px">
    <div class="modal-hdr">
      <h3 id="auth-modal-title">ВХОД В АККАУНТ</h3>
      <button onclick="closeAuthModal()">×</button>
    </div>
    <!-- Tabs -->
    <div style="display:flex;gap:0;padding:0 24px;border-bottom:1px solid var(--line)">
      <button id="tab-login" onclick="switchAuthTab('login')" style="flex:1;padding:12px 0;background:none;border:none;border-bottom:2px solid var(--ink);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--ink);transition:.2s;font-family:'DM Sans',sans-serif">Войти</button>
      <button id="tab-reg" onclick="switchAuthTab('reg')" style="flex:1;padding:12px 0;background:none;border:none;border-bottom:2px solid transparent;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);transition:.2s;font-family:'DM Sans',sans-serif">Регистрация</button>
    </div>
    <!-- Login form -->
    <div id="auth-login-form" class="modal-body">
      <div id="auth-error" style="display:none;background:#fbeaea;border:1px solid #f5a0a0;border-radius:3px;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--red);margin-bottom:14px"></div>
      <div class="fg">
        <label>Телефон</label>
        <input id="login-phone" type="tel" placeholder="+7 900 000-00-00" autocomplete="tel">
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Пароль</label>
        <div style="position:relative">
          <input id="login-pass" type="password" placeholder="Введите пароль" autocomplete="current-password" style="width:100%;padding:10px 40px 10px 12px;border:1px solid var(--line);border-radius:3px;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s">
          <button onclick="togglePassVis('login-pass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:0;line-height:1">👁</button>
        </div>
      </div>
    </div>
    <div class="modal-foot" id="auth-login-foot">
      <button class="btn-cancel" onclick="closeAuthModal()">Отмена</button>
      <button class="btn-order" onclick="submitLogin()">ВОЙТИ →</button>
    </div>
    <!-- Register form -->
    <div id="auth-reg-form" class="modal-body" style="display:none">
      <div id="reg-error" style="display:none;background:#fbeaea;border:1px solid #f5a0a0;border-radius:3px;padding:10px 14px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--red);margin-bottom:14px"></div>
      <div class="fg">
        <label>ФИО <span style="color:var(--red)">*</span></label>
        <input id="reg-name" type="text" placeholder="Иванов Иван Иванович" autocomplete="name">
      </div>
      <div class="fg">
        <label>Название сервисного центра <span style="color:var(--red)">*</span></label>
        <input id="reg-company" type="text" placeholder="ООО Мастер" autocomplete="organization">
      </div>
      <div class="fg">
        <label>Телефон <span style="color:var(--red)">*</span></label>
        <input id="reg-phone" type="tel" placeholder="+7 900 000-00-00" autocomplete="tel">
      </div>
      <div class="fg">
        <label>Пароль <span style="color:var(--red)">*</span></label>
        <div style="position:relative">
          <input id="reg-pass" type="password" placeholder="Минимум 4 символа" autocomplete="new-password" style="width:100%;padding:10px 40px 10px 12px;border:1px solid var(--line);border-radius:3px;font-size:13px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s">
          <button onclick="togglePassVis('reg-pass',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:0;line-height:1">👁</button>
        </div>
      </div>
      <div class="fg" style="margin-bottom:0">
        <label>Повторите пароль <span style="color:var(--red)">*</span></label>
        <input id="reg-pass2" type="password" placeholder="Повторите пароль" autocomplete="new-password">
      </div>
    </div>
    <div class="modal-foot" id="auth-reg-foot" style="display:none">
      <button class="btn-cancel" onclick="closeAuthModal()">Отмена</button>
      <button class="btn-order" onclick="submitRegister()">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>
  </div>
</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-hdr">
    <h3>КОРЗИНА</h3>
    <button onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items-list"></div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>ИТОГО</span>
      <span id="cart-total-val">0 ₽</span>
    </div>
    <button class="cart-checkout" onclick="checkoutCart()">ОФОРМИТЬ ЗАКАЗ →</button>
  </div>
</div>

<!-- FAB -->
<button class="cart-fab" onclick="toggleCart()" title="Корзина">
  🛒
  <span class="cart-fab-count" id="cart-fab-count" style="display:none">0</span>
</button>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let _cat  = ''
let _cart = JSON.parse(localStorage.getItem('shop_cart')||'[]')
let _user = JSON.parse(localStorage.getItem('shop_user')||'null')
// _user: {name, phone, company, status: 'retail'|'opt'|'vip'}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const TIERS = {
  retail: {field:'price_retail', label:'Розница', cls:'retail', icon:'💳'},
  opt:    {field:'price_opt',    label:'Опт',     cls:'opt',    icon:'📦'},
  vip:    {field:'price_vip',    label:'VIP',     cls:'vip',    icon:'⭐'},
}
function catEmoji(cat){
  if(!cat) return '📦'
  const c=cat.toLowerCase()
  if(c.includes('запч')) return '🔩'
  if(c.includes('акс')) return '🎧'
  if(c.includes('расх')) return '🧴'
  if(c.includes('стекл')) return '📱'
  if(c.includes('гидр')) return '🛡️'
  return '📦'
}
function getItems(){
  return (JSON.parse(localStorage.getItem('wh_items')||'[]')).filter(it=>it.qty>0)
}
function userStatus(){ return _user?(_user.status||'retail'):'retail' }

// ── AUTH ──────────────────────────────────────────────────────────────────────
// shop_accounts: [{phone, passHash, name, company, status, created_at}]
function getAccounts(){ return JSON.parse(localStorage.getItem('shop_accounts')||'[]') }
function saveAccounts(a){ localStorage.setItem('shop_accounts',JSON.stringify(a)) }

// простой хэш — не криптографический, для localStorage достаточно
function simpleHash(s){
  let h=0
  for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}
  return h.toString(36)
}
function normPhone(p){ return p.replace(/\D/g,'') }

function openAuthModal(tab){
  switchAuthTab(tab||'login')
  document.getElementById('login-phone').value=''
  document.getElementById('login-pass').value=''
  document.getElementById('auth-error').style.display='none'
  document.getElementById('reg-error').style.display='none'
  document.getElementById('m-auth').classList.remove('hidden')
}
function closeAuthModal(){
  document.getElementById('m-auth').classList.add('hidden')
}
function switchAuthTab(t){
  const isLogin=t==='login'
  document.getElementById('auth-login-form').style.display=isLogin?'':'none'
  document.getElementById('auth-login-foot').style.display=isLogin?'':'none'
  document.getElementById('auth-reg-form').style.display=isLogin?'none':''
  document.getElementById('auth-reg-foot').style.display=isLogin?'none':''
  document.getElementById('tab-login').style.borderBottomColor=isLogin?'#0f0f0f':'transparent'
  document.getElementById('tab-login').style.color=isLogin?'#0f0f0f':'#a3a3a3'
  document.getElementById('tab-login').style.fontWeight=isLogin?'700':'600'
  document.getElementById('tab-reg').style.borderBottomColor=isLogin?'transparent':'#0f0f0f'
  document.getElementById('tab-reg').style.color=isLogin?'#a3a3a3':'#0f0f0f'
  document.getElementById('tab-reg').style.fontWeight=isLogin?'600':'700'
  document.getElementById('auth-modal-title').textContent=isLogin?'Вход в аккаунт':'Регистрация'
}
function togglePassVis(id,btn){
  const inp=document.getElementById(id)
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈'}
  else{inp.type='password';btn.textContent='👁'}
}
function showAuthError(msg){ const e=document.getElementById('auth-error');e.textContent=msg;e.style.display='block' }
function showRegError(msg){ const e=document.getElementById('reg-error');e.textContent=msg;e.style.display='block' }

function submitLogin(){
  document.getElementById('auth-error').style.display='none'
  const phone=normPhone(document.getElementById('login-phone').value.trim())
  const pass=document.getElementById('login-pass').value
  if(!phone||phone.length<7){ showAuthError('Введите номер телефона'); return }
  if(!pass){ showAuthError('Введите пароль'); return }
  const accounts=getAccounts()
  const acc=accounts.find(a=>normPhone(a.phone)===phone)
  if(!acc){ showAuthError('Аккаунт с таким номером не найден. Зарегистрируйтесь.'); return }
  if(acc.passHash!==simpleHash(pass)){ showAuthError('Неверный пароль'); return }
  // Подтягиваем shop_status из CRM если есть
  const clients=JSON.parse(localStorage.getItem('clients')||'[]')
  const crmClient=clients.find(c=>normPhone(c.phone||'')===phone)
  const status=crmClient&&crmClient.shop_status?crmClient.shop_status:(acc.status||'retail')
  _user={name:acc.name,phone:acc.phone,company:acc.company||'',status}
  localStorage.setItem('shop_user',JSON.stringify(_user))
  closeAuthModal()
  updateAuthUI();renderShop();renderCart()
}

function submitRegister(){
  document.getElementById('reg-error').style.display='none'
  const name=document.getElementById('reg-name').value.trim()
  const company=document.getElementById('reg-company').value.trim()
  const phone=document.getElementById('reg-phone').value.trim()
  const pass=document.getElementById('reg-pass').value
  const pass2=document.getElementById('reg-pass2').value
  if(!name){ showRegError('Укажите ФИО'); return }
  if(!company){ showRegError('Укажите название сервисного центра'); return }
  if(!phone||normPhone(phone).length<7){ showRegError('Укажите корректный номер телефона'); return }
  if(!pass||pass.length<4){ showRegError('Пароль должен содержать минимум 4 символа'); return }
  if(pass!==pass2){ showRegError('Пароли не совпадают'); return }
  const accounts=getAccounts()
  if(accounts.find(a=>normPhone(a.phone)===normPhone(phone))){
    showRegError('Аккаунт с этим номером уже существует. Войдите.')
    return
  }
  // Подтягиваем shop_status из CRM если уже есть такой клиент
  const clients=JSON.parse(localStorage.getItem('clients')||'[]')
  const crmClient=clients.find(c=>normPhone(c.phone||'')===normPhone(phone))
  const status=crmClient&&crmClient.shop_status?crmClient.shop_status:'retail'
  const newAcc={phone:normPhone(phone),passHash:simpleHash(pass),name,company,status,created_at:new Date().toISOString()}
  accounts.push(newAcc)
  saveAccounts(accounts)
  _user={name,phone:normPhone(phone),company,status}
  localStorage.setItem('shop_user',JSON.stringify(_user))
  closeAuthModal()
  updateAuthUI();renderShop();renderCart()
}

function logoutUser(){
  _user=null
  localStorage.removeItem('shop_user')
  updateAuthUI()
  renderShop();renderCart()
}
function updateAuthUI(){
  const lbl=document.getElementById('auth-btn-label')
  const bar=document.getElementById('status-bar')
  const badge=document.getElementById('user-status-badge')
  const welcome=document.getElementById('user-welcome')
  if(_user){
    lbl.textContent=_user.name.split(' ')[0]
    bar.style.display='block'
    const t=TIERS[_user.status||'retail']||TIERS.retail
    badge.textContent=t.icon+' '+t.label
    badge.className='status-badge '+t.cls
    welcome.textContent=_user.company?_user.company+' · '+_user.name:_user.name
  } else {
    lbl.textContent='Войти'
    bar.style.display='none'
  }
}

// ── CATEGORIES ────────────────────────────────────────────────────────────────
function setCat(c,el){
  _cat=c
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('active'))
  if(el) el.classList.add('active')
  renderShop()
}
function buildCats(){
  const items=getItems()
  const cats=[...new Set(items.map(it=>it.cat||'').filter(Boolean))].sort()
  const bar=document.getElementById('cats-bar')
  bar.innerHTML=`<button class="cat-pill active" onclick="setCat('',this)">Все товары</button>`
    +cats.map(c=>`<button class="cat-pill" onclick="setCat('${c}',this)">${catEmoji(c)} ${c}</button>`).join('')
}

// ── RENDER SHOP ───────────────────────────────────────────────────────────────
function renderShop(){
  const q=document.getElementById('shop-search').value.toLowerCase()
  let items=getItems()
  if(_cat) items=items.filter(it=>(it.cat||'')==_cat)
  if(q)    items=items.filter(it=>it.name.toLowerCase().includes(q)||(it.sku||'').toLowerCase().includes(q))
  const grid=document.getElementById('shop-grid')
  if(!items.length){
    grid.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><p>Ничего не найдено — попробуйте другой запрос</p></div>'
    return
  }
  const uStatus=userStatus()
  grid.innerHTML=items.map(it=>{
    const prices=Object.entries(TIERS).map(([k,t])=>{
      const p=it[t.field]
      if(!p) return ''
      const isUser=(k===uStatus)
      return `<div class="price-tag ${t.cls}${isUser&&_user?' highlighted':''}">
        <div class="price-tag-lbl">${t.icon} ${t.label}</div>
        <div class="price-tag-val">${Number(p).toLocaleString('ru')} ₽</div>
      </div>`
    }).join('')
    const hasPrices=it.price_retail||it.price_opt||it.price_vip
    const stock=it.qty<=0?'out':it.qty<=3?'low':'in'
    const stockText=it.qty<=0?'Нет в наличии':it.qty<=3?`Осталось ${it.qty} шт.`:'В наличии'
    // Price for cart = user's tier price or first available
    const cartPrice=it[TIERS[uStatus].field]||it.price_retail||it.price_opt||it.price_vip||0
    return `<div class="card">
      <div class="card-img">${catEmoji(it.cat)}</div>
      <div class="card-body">
        <div class="card-cat">${it.cat||'Товар'}</div>
        <div class="card-name">${it.name}</div>
        ${it.sku?`<div class="card-sku">Арт: ${it.sku}</div>`:''}
        <div class="card-stock ${stock}">${stock==='in'?'✓ ':stock==='low'?'⚠ ':'✕ '}${stockText}</div>
        ${hasPrices?`<div class="prices-block">${prices}</div>`:'<div style="font-size:12px;color:#94a3b8;margin-top:6px">Цена по запросу</div>'}
        <button class="card-btn${_cart.find(c=>c.id===it.id)?' card-btn-in':''}" id="cb-${it.id}" onclick="cartAdd(${it.id},this)" ${it.qty<=0?'disabled':''}>
          ${_cart.find(c=>c.id===it.id)?'✓ В корзине':'+ В корзину'}
        </button>
      </div>
    </div>`
  }).join('')
}

// ── CART ADD (прямо с карточки, без модалки) ─────────────────────────────────
function cartAdd(id, btn){
  addToCart(id, 1)
  if(btn){ btn.textContent='✓ В корзине'; btn.classList.add('card-btn-in'); btn.style.background='' }
}

// ── CHECKOUT ──────────────────────────────────────────────────────────────────
function openCheckout(){
  if(!_cart.length){ alert('Корзина пуста'); return }
  if(!_user){ openAuthModal('login'); return }
  const t=TIERS[_user.status||'retail']||TIERS.retail
  // Клиент
  document.getElementById('co-client-found').innerHTML=
    '👤 <b>'+_user.name+'</b>'
    +(_user.company?' &nbsp;·&nbsp; '+_user.company:'')
    +'<br>'+t.icon+' '+t.label+' &nbsp;·&nbsp; 📞 '+_user.phone
  // Состав корзины
  const allItems=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const status=_user.status||'retail'
  let cartTotal=0
  const rows=_cart.map(c=>{
    const it=allItems.find(i=>i.id===c.id)
    const price=it?(it[TIERS[status].field]||it.price_retail||it.price_opt||it.price_vip||c.price):c.price
    cartTotal+=price*c.qty
    return `<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;border-bottom:1px solid #f0f0f0">
      <span style="color:#525252">${c.name} <span style="color:#a3a3a3">× ${c.qty}</span></span>
      <span style="font-weight:700">${(price*c.qty).toLocaleString('ru')} ₽</span>
    </div>`
  }).join('')
  document.getElementById('co-cart-summary').innerHTML=rows
    +`<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:800;padding-top:8px;margin-top:2px">
      <span>Итого</span><span style="color:#e11d48">${cartTotal.toLocaleString('ru')} ₽</span>
    </div>`
  document.getElementById('co-comment').value=''
  document.getElementById('checkout-success').style.display='none'
  document.getElementById('checkout-form-wrap').style.display=''
  document.getElementById('checkout-submit-btn').style.display=''
  document.getElementById('m-checkout').classList.remove('hidden')
}
function closeCheckout(){ document.getElementById('m-checkout').classList.add('hidden') }

function submitCheckout(){
  if(!_user){ closeCheckout(); openAuthModal('login'); return }
  const status=_user.status||'retail'
  const allItems=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const cartFinal=_cart.map(c=>{
    const it=allItems.find(i=>i.id===c.id)
    const price=it?(it[TIERS[status].field]||it.price_retail||it.price_opt||it.price_vip||c.price):c.price
    return{...c,price}
  })
  const total=cartFinal.reduce((s,c)=>s+(c.price*c.qty),0)
  const orders=JSON.parse(localStorage.getItem('shop_orders')||'[]')
  orders.push({
    id:Date.now(),
    item_id:'cart',
    item_name:'Заказ из корзины ('+_cart.length+' поз.)',
    items:cartFinal,
    qty:_cart.reduce((s,c)=>s+c.qty,0),
    price:total, total,
    tier:status,
    client:_user.name,
    phone:_user.phone,
    company:_user.company||'',
    comment:document.getElementById('co-comment').value.trim(),
    status:'new',
    created_at:new Date().toISOString()
  })
  localStorage.setItem('shop_orders',JSON.stringify(orders))
  _cart=[];saveCart();renderCart();updateCartCount();renderShop()
  document.getElementById('checkout-success').style.display='flex'
  document.getElementById('checkout-form-wrap').style.display='none'
  document.getElementById('checkout-submit-btn').style.display='none'
  setTimeout(closeCheckout,2800)
}

// ── CART ──────────────────────────────────────────────────────────────────────
// Корзина хранит только id+qty+name — цена всегда считается по статусу пользователя
function getCartPrice(it){
  const status=userStatus()
  const tier=TIERS[status]||TIERS.retail
  return it[tier.field]||it.price_retail||it.price_opt||it.price_vip||0
}
function addToCart(id,qty){
  const items=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const it=items.find(i=>i.id===id)
  if(!it) return
  const ex=_cart.find(c=>c.id===id)
  if(ex){ ex.qty+=qty } else { _cart.push({id,name:it.name,qty,cat:it.cat}) }
  saveCart(); renderCart(); updateCartCount()
}
function removeFromCart(id){
  _cart=_cart.filter(c=>c.id!==id)
  saveCart(); renderCart(); updateCartCount(); renderShop()
}
function changeQty(id,delta){
  const item=_cart.find(c=>c.id===id)
  if(!item) return
  item.qty=Math.max(1,item.qty+delta)
  saveCart(); renderCart(); updateCartCount()
}
function saveCart(){ localStorage.setItem('shop_cart',JSON.stringify(_cart)) }
function updateCartCount(){
  const total=_cart.reduce((s,c)=>s+c.qty,0)
  const cc=document.getElementById('cart-count')
  const fc=document.getElementById('cart-fab-count')
  if(cc){ cc.textContent=total; cc.style.background=total>0?'#ef4444':'rgba(255,255,255,.3)' }
  if(fc){ fc.textContent=total; fc.style.display=total>0?'inline-block':'none' }
  const fab=document.querySelector('.cart-fab')
  if(fab&&total>0){ fab.style.transform='scale(1.18)'; setTimeout(()=>fab.style.transform='',200) }
}
function renderCart(){
  const list=document.getElementById('cart-items-list')
  if(!_cart.length){
    list.innerHTML='<div class="cart-empty"><div class="cart-empty-icon">🛒</div>Корзина пуста</div>'
    document.getElementById('cart-total-val').textContent='0 ₽'
    return
  }
  const allItems=JSON.parse(localStorage.getItem('wh_items')||'[]')
  const status=userStatus()
  const t=TIERS[status]||TIERS.retail
  // Плашка текущего тира в шапке корзины
  const tierColors={retail:'#1d4ed8',opt:'#059669',vip:'#92400e'}
  const tierBg={retail:'#eff6ff',opt:'#f0fdf4',vip:'#fffbeb'}
  let grandTotal=0
  const rows=_cart.map(c=>{
    const it=allItems.find(i=>i.id===c.id)
    const price=it?getCartPriceById(c.id,allItems):0
    grandTotal+=price*c.qty
    return `<div class="cart-item">
    <div class="cart-item-info">
      <div class="cart-item-name">${c.name}</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
        <div class="cart-item-price">${price>0?(price*c.qty).toLocaleString('ru')+' ₽':'По запросу'}</div>
        ${price>0?`<span style="font-size:10.5px;color:#a3a3a3">(${price.toLocaleString('ru')} ₽ × ${c.qty})</span>`:''}
      </div>
      <div class="qty-ctrl">
        <button onclick="changeQty(${c.id},-1)">−</button>
        <span>${c.qty}</span>
        <button onclick="changeQty(${c.id},+1)">+</button>
        <button onclick="removeFromCart(${c.id})" style="color:#dc2626;border-color:#fecaca">✕</button>
      </div>
    </div>
  </div>`
  }).join('')
  // Тир-баннер + итог
  const tierLabel=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:${tierBg[status]};border-radius:8px;margin-bottom:10px;font-size:11.5px;font-weight:700;color:${tierColors[status]}">
    <span>${t.icon} Цены: ${t.label}</span>
    ${_user?'':'<span style="color:#a3a3a3;font-weight:500">Войдите для своих цен</span>'}
  </div>`
  list.innerHTML=tierLabel+rows
  document.getElementById('cart-total-val').textContent=grandTotal.toLocaleString('ru')+' ₽'
}
function getCartPriceById(id, allItems){
  const it=allItems.find(i=>i.id===id)
  if(!it) return 0
  return getCartPrice(it)
}
function toggleCart(){ document.getElementById('cart-panel').classList.toggle('open') }
function checkoutCart(){
  toggleCart()
  openCheckout()
}

// ── INIT ──────────────────────────────────────────────────────────────────────
;(function init(){
  const shopName=localStorage.getItem('shop_name')||localStorage.getItem('org_code')||'Zero.height'
  document.getElementById('shop-name').textContent=shopName
  document.title=shopName+' — Витрина'
  buildCats()
  renderShop()
  renderCart()
  updateCartCount()
  updateAuthUI()
})()
</script>
</body>
</html>
