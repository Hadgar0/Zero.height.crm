version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-crm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm_secret}
      POSTGRES_DB: ${DB_NAME:-crm_db}
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://${DB_USER:-crm}:${DB_PASSWORD:-crm_secret}@db:5432/${DB_NAME:-crm_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_prod}
      PORT: 4000
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    ports:
      - '3000:3000'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:
